<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <meta name="description" content="Route Scout - Your travel companion" />
    <title>Route Scout</title>
    <script>
      // GitHub Pages SPA redirect — decode ?p= back into the real path
      (function () {
        var p = window.location.search.slice(1).split('&').find(function (s) { return s.startsWith('p=') })
        if (p) {
          var decoded = decodeURIComponent(p.slice(2))
          window.history.replaceState(null, null, '/' + decoded)
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
